<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zeppelin · Costos de Barra y Cocina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0A0A0A; --surface:#151515; --surface2:#1d1d1d; --line:#2a2a2a;
  --orange:#FF5A00; --orange-dim:#c4470a; --text:#f4f4f4; --muted:#8c8c8c;
  --green:#35c759; --red:#ff453a; --yellow:#3a3414; --barra:#FF5A00; --cocina:#36b34a; --promo:#b65cff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:'Oswald',system-ui,sans-serif;font-weight:300}
body{padding-bottom:40px}
.num{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:'Oswald',sans-serif;font-weight:300}
input:focus,select:focus,textarea:focus{outline:2px solid var(--orange);outline-offset:-1px}

/* ---- top rail ---- */
header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#0d0d0d,#0a0a0a);border-bottom:1px solid var(--line)}
.rail{display:flex;align-items:center;gap:14px;padding:12px 16px;max-width:1100px;margin:0 auto}
.brand{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:.9}
.brand b{color:var(--orange)}
.brand span{display:block;font-family:'Oswald';font-weight:300;font-size:10px;letter-spacing:3px;color:var(--muted);margin-top:2px}
.rail-stats{margin-left:auto;display:flex;gap:18px}
.stat{text-align:right}
.stat .v{font-family:'Bebas Neue';font-size:26px;line-height:.9;color:var(--orange)}
.stat .l{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.tools{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 12px;max-width:1100px;margin:0 auto}
.tools button{background:var(--surface);border:1px solid var(--line);color:var(--text);padding:7px 12px;border-radius:7px;font-size:12px;letter-spacing:.5px}
.tools button:hover{border-color:var(--orange)}
.tools .danger:hover{border-color:var(--red);color:var(--red)}
.syncchip{font-size:11px;letter-spacing:.5px;padding:7px 11px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer}
.syncchip.ok{color:var(--green);border-color:#1f4d2a}
.syncchip.err{color:var(--red);border-color:#5a2420}
.syncchip.warn{color:#ffd23f;border-color:#4a431c}

/* ---- tab bar ---- */
nav{position:sticky;top:63px;z-index:25;background:#0a0a0a;border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs{display:flex;gap:0;max-width:1100px;margin:0 auto;min-width:max-content}
.tab{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);padding:13px 18px;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--orange)}
.tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}

main{max-width:1100px;margin:0 auto;padding:16px}
.searchbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.searchbar input{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px}
.addbtn{background:var(--orange);color:#0a0a0a;border:none;padding:10px 16px;border-radius:8px;font-weight:600;font-size:13px;letter-spacing:.5px}
.addbtn:hover{background:#ff6f1f}

/* ---- product card ---- */
.card{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:10px;margin-bottom:10px;overflow:hidden}
.card.cocina{border-left-color:var(--cocina)}
.card.promo{border-left-color:var(--promo)}
.chead{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.chead:hover{background:var(--surface2)}
.cname{font-size:16px;font-weight:400;flex:1;min-width:0}
.cname small{display:block;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:300}
.metric{text-align:right;min-width:62px}
.metric .v{font-family:'Bebas Neue';font-size:22px;line-height:.9}
.metric .l{font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.fc-good{color:var(--green)} .fc-mid{color:#ffd23f} .fc-bad{color:var(--red)}
.caret{color:var(--muted);font-size:13px;transition:transform .15s;width:14px;text-align:center}
.card.open .caret{transform:rotate(90deg)}
.cbody{display:none;padding:4px 14px 14px;border-top:1px solid var(--line)}
.card.open .cbody{display:block}

.lines{width:100%;border-collapse:collapse;margin:6px 0}
.lines th{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:left;padding:4px 6px;font-weight:400}
.lines td{padding:4px 6px;border-top:1px solid #202020;font-size:13px}
.lines td.r{text-align:right}
.qty{width:74px;background:var(--yellow);border:1px solid #4a431c;color:#ffe7a3;padding:5px 7px;border-radius:6px;text-align:right;font-size:13px}
.ucell{color:var(--muted);font-size:12px}
.del{background:none;border:none;color:#5a5a5a;font-size:15px;padding:2px 6px}
.del:hover{color:var(--red)}
.addline{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
.addline select{flex:1;min-width:140px;background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:7px;border-radius:6px;font-size:13px}
.addline .qty{flex:0 0 80px}
.miniadd{background:var(--surface2);border:1px dashed var(--orange-dim);color:var(--orange);padding:7px 11px;border-radius:6px;font-size:12px}

.priceline{display:flex;align-items:center;gap:8px;margin:4px 0 2px;font-size:13px;color:var(--muted)}
.priceline input{width:100px;background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:6px 8px;border-radius:6px;text-align:right;font-size:14px}
.summaryrow{display:flex;gap:14px;flex-wrap:wrap;padding:8px 0 2px;font-size:13px}
.summaryrow b{color:var(--text);font-weight:500}

/* ingredient table */
.itable{width:100%;border-collapse:collapse}
.itable th{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:left;padding:8px 6px;font-weight:400;border-bottom:1px solid var(--line);background:#0a0a0a}
.itable td{padding:6px;border-bottom:1px solid #1a1a1a;font-size:13px}
.itable td.r{text-align:right}
.itable input{background:var(--yellow);border:1px solid #4a431c;color:#ffe7a3;padding:6px 8px;border-radius:6px;font-size:13px;width:96px;text-align:right}
.itable select{background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:5px;border-radius:6px;font-size:12px}
.badge{display:inline-block;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:20px;font-weight:500}
.b-barra{background:rgba(255,90,0,.16);color:var(--orange)}
.b-cocina{background:rgba(54,179,74,.16);color:var(--cocina)}
.b-ambos{background:#2a2a2a;color:#bbb}
.b-promo{background:rgba(182,92,255,.16);color:var(--promo)}

/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:50}
.modal.show{display:flex}
.sheet{background:var(--surface);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:20px;max-height:88vh;overflow:auto}
@media(min-width:560px){.modal{align-items:center}.sheet{border-radius:16px}}
.sheet h3{font-family:'Bebas Neue';font-size:26px;margin:0 0 14px;letter-spacing:1px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:10px;border-radius:8px;font-size:15px}
.sheet-actions{display:flex;gap:10px;margin-top:18px}
.sheet-actions button{flex:1;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:500;letter-spacing:.5px}
.btn-save{background:var(--orange);color:#0a0a0a}
.btn-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--line)!important}

.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
.target-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);padding:10px 14px;border-radius:10px;margin-bottom:14px;flex-wrap:wrap}
.target-bar input{width:70px;background:var(--yellow);border:1px solid #4a431c;color:#ffe7a3;padding:6px 8px;border-radius:6px;text-align:right;font-size:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--orange);color:#0a0a0a;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:500;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;letter-spacing:.5px}
.toast.show{opacity:1}
.hint{font-size:11px;color:var(--muted);line-height:1.5;margin:2px 0 12px}
</style>
</head>

window.addEventListener('focus', ()=>{ if(cfg && cfg.token && !dirty && !pushing) initialPull(true); });

let ui = { tab:'barra', search:'', open:{}, target:30 };

/* ---------- helpers ---------- */
const ingById = id => state.ingredients.find(i=>i.id===id);
const prodById = id => state.products.find(p=>p.id===id);
function unitCost(ing, path){
  if(!ing) return 0;
  path = path || [];
  if(path.indexOf(ing.id) >= 0) return 0; // corta ciclos
  const m = Math.min(Math.max(+ing.merma||0,0),95);
  if(ing.kind==='prep'){
    const y = +ing.yield||0; if(y<=0) return 0;
    const np = path.concat(ing.id);
    const batch = state.recipes.filter(r=>r.productId===ing.id).reduce((a,r)=> a + (+r.qty||0)*unitCost(ingById(r.ingredientId), np), 0);
    return (batch/y)/(1-m/100);
  }
  const p=+ing.buyPrice||0, s=+ing.buySize||0; if(s<=0) return 0;
  return (p/s)/(1-m/100);
}
function recipesOf(pid){ return state.recipes.filter(r=>r.productId===pid); }
function productCost(pid){
  const p=prodById(pid);
  if(p && p.area==='promo') return (+p.manualCost||0);
  return recipesOf(pid).reduce((a,r)=>{ const q=+r.qty||0; return a + q*unitCost(ingById(r.ingredientId)); },0);
}
function fcClass(fc){ if(fc==null||isNaN(fc)) return ''; if(fc<=ui.target) return 'fc-good'; if(fc<=ui.target+12) return 'fc-mid'; return 'fc-bad'; }
let _id=1; const newId=pre=>pre+Date.now().toString(36)+(_id++);

/* ---------- stats ---------- */
function refreshStats(){
  document.getElementById('stat-prod').textContent = state.products.length;
  let fcs=[];
  state.products.forEach(p=>{ const c=productCost(p.id), pr=+p.price||0; if(pr>0&&c>0) fcs.push(c/pr*100); });
  const avg = fcs.length? fcs.reduce((a,b)=>a+b,0)/fcs.length : null;
  const el=document.getElementById('stat-fc');
  el.textContent = avg==null? '—' : Math.round(avg)+'%';
  el.className = 'v num '+fcClass(avg);
}

/* ---------- tabs ---------- */
const TABS=[['barra','Barra','var(--barra)'],['cocina','Cocina','var(--cocina)'],['promo','Promos','var(--promo)'],['elab','Elaborados','#ffd23f'],['ing','Ingredientes',''],['resumen','Resumen','']];
function renderTabs(){
  document.getElementById('tabs').innerHTML = TABS.map(([k,l,c])=>
    `<button class="tab ${ui.tab===k?'active':''}" onclick="go('${k}')">${c?`<span class="dot" style="background:${c}"></span>`:''}${l}</button>`).join('');
}
function go(t){ ui.tab=t; ui.search=''; renderTabs(); render(); window.scrollTo(0,0); }

/* ---------- render ---------- */
function render(){
  const m=document.getElementById('main');
  if(ui.tab==='ing') return renderIngredients(m);
  if(ui.tab==='elab') return renderElab(m);
  if(ui.tab==='resumen') return renderResumen(m);
  if(ui.tab==='promo') return renderPromos(m);
  renderProducts(m, ui.tab);
}

function searchBar(placeholder, addLabel, addFn){
  return `<div class="searchbar">
    <input id="search" placeholder="${placeholder}" value="${ui.search.replace(/"/g,'&quot;')}" oninput="ui.search=this.value;rerenderList()">
    <button class="addbtn" onclick="${addFn}">＋ ${addLabel}</button></div><div id="list"></div>`;
}
function rerenderList(){
  const list=document.getElementById('list'); if(!list) return;
  if(ui.tab==='ing') fillIngredients(list);
  else if(ui.tab==='elab') fillElab(list);
  else if(ui.tab==='promo') fillPromos(list);
  else fillProducts(list, ui.tab);
}

/* products (barra/cocina) */
function renderProducts(m, area){
  m.innerHTML = searchBar('Buscar producto…', area==='barra'?'Producto de barra':'Producto de cocina', `addProduct('${area}')`);
  fillProducts(document.getElementById('list'), area);
}
function fillProducts(list, area){
  const q=ui.search.toLowerCase();
  const items=state.products.filter(p=>p.area===area && (p.name.toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)));
  if(!items.length){ list.innerHTML=`<div class="empty">Sin productos. Tocá «＋» para agregar uno.</div>`; return; }
  // group by category
  const groups={};
  items.forEach(p=>{ (groups[p.category]=groups[p.category]||[]).push(p); });
  list.innerHTML = Object.entries(groups).map(([cat,ps])=>
    `<div style="font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:14px 2px 6px">${cat}</div>`+
    ps.map(p=>productCard(p,area)).join('')
  ).join('');
}

function productCard(p, area){
  const cost=productCost(p.id), price=+p.price||0;
  const marg=price-cost, fc = price>0&&cost>0? cost/price*100 : null;
  const open = ui.open[p.id];
  const lines=recipesOf(p.id);
  return `<div class="card ${area} ${open?'open':''}">
    <div class="chead" onclick="toggle('${p.id}')">
      <span class="caret">▶</span>
      <div class="cname">${p.name}<small>${lines.length} ingrediente${lines.length!==1?'s':''}</small></div>
      <div class="metric"><div class="v num">${cost>0?fmt.format(cost):'—'}</div><div class="l">costo</div></div>
      <div class="metric"><div class="v num ${fcClass(fc)}">${fc!=null?Math.round(fc)+'%':'—'}</div><div class="l">food cost</div></div>
    </div>
    <div class="cbody">
      <div class="priceline">Precio de venta <input class="num" type="number" inputmode="decimal" value="${p.price??''}" onchange="setPrice('${p.id}',this.value)"> 
        <span style="margin-left:auto">Margen <b class="num" style="color:${marg>=0?'var(--green)':'var(--red)'}">${fmt.format(marg)}</b></span></div>
      <table class="lines"><thead><tr><th>Ingrediente</th><th>Cant.</th><th>Un.</th><th class="r">$/u</th><th class="r">Costo</th><th></th></tr></thead><tbody>
      ${lines.map(r=>{const ing=ingById(r.ingredientId);const uc=unitCost(ing);const lc=(+r.qty||0)*uc;
        return `<tr><td>${ing?ing.name:'<i>?</i>'}</td>
        <td><input class="qty num" type="number" inputmode="decimal" value="${r.qty??''}" placeholder="0" onchange="setQty('${r.id}',this.value)"></td>
        <td class="ucell">${r.unit||(ing?ing.unit:'')}</td>
        <td class="r ucell num">${uc>0?fmt2.format(uc):'—'}</td>
        <td class="r num">${lc>0?fmt.format(lc):'—'}</td>
        <td><button class="del" onclick="delLine('${r.id}')">✕</button></td></tr>`;}).join('')}
      </tbody></table>
      <div class="addline">
        ${ingredientSelect(p.id, area)}
        <input class="qty num" type="number" inputmode="decimal" placeholder="cant." id="nq_${p.id}">
        <button class="miniadd" onclick="addLine('${p.id}')">＋ Agregar</button>
      </div>
    </div></div>`;
}
function ingredientSelect(pid, area, excludeId){
  const opts=state.ingredients.filter(i=>(!area||i.area===area||i.area==='ambos') && i.id!==excludeId)
    .sort((a,b)=>a.name.localeCompare(b.name))
    .map(i=>`<option value="${i.id}">${i.name} (${i.unit})${i.kind==='prep'?' ⚗':''}</option>`).join('');
  return `<select id="ni_${pid}"><option value="">Elegí ingrediente…</option>${opts}<option value="__new__">➕ Crear nuevo…</option></select>`;
}

/* promos */
function renderPromos(m){
  m.innerHTML = searchBar('Buscar promo…','Promo','addPromo()');
  fillPromos(document.getElementById('list'));
}
function fillPromos(list){
  const q=ui.search.toLowerCase();
  const items=state.products.filter(p=>p.area==='promo'&&p.name.toLowerCase().includes(q));
  if(!items.length){ list.innerHTML=`<div class="empty">Sin promos.</div>`; return; }
  list.innerHTML = `<div class="hint">Las promos son combos de productos ya costeados. Cargá el costo sumando sus componentes desde Barra y Cocina.</div>`+
    items.map(p=>{
      const cost=+p.manualCost||0, price=+p.price||0, marg=price-cost, fc=price>0&&cost>0?cost/price*100:null;
      return `<div class="card promo">
        <div class="chead" style="cursor:default">
          <div class="cname">${p.name}<small>${p.composition||''}</small></div>
          <div class="metric"><div class="v num ${fcClass(fc)}">${fc!=null?Math.round(fc)+'%':'—'}</div><div class="l">food cost</div></div>
        </div>
        <div class="cbody" style="display:block">
          <div class="priceline">Costo insumos <input class="num" type="number" inputmode="decimal" value="${p.manualCost??''}" placeholder="0" onchange="setManual('${p.id}',this.value)">
            <span style="margin-left:12px">Precio <input class="num" type="number" value="${p.price??''}" onchange="setPrice('${p.id}',this.value)"></span>
            <span style="margin-left:auto">Margen <b class="num" style="color:${marg>=0?'var(--green)':'var(--red)'}">${fmt.format(marg)}</b></span></div>
          <div style="display:flex;justify-content:flex-end"><button class="del" onclick="delProduct('${p.id}')" style="font-size:12px">Eliminar promo</button></div>
        </div></div>`;
    }).join('');
}

/* ingredients */
function renderIngredients(m){
  m.innerHTML = searchBar('Buscar ingrediente…','Ingrediente','addIngredient()');
  fillIngredients(document.getElementById('list'));
}
function fillIngredients(list){
  const q=ui.search.toLowerCase();
  const items=state.ingredients.filter(i=>i.name.toLowerCase().includes(q)).sort((a,b)=>a.area.localeCompare(b.area)||a.name.localeCompare(b.name));
  if(!items.length){ list.innerHTML=`<div class="empty">Sin ingredientes.</div>`; return; }
  list.innerHTML = `<div class="hint">Cargá precio de compra y tamaño (en la unidad base). La <b style="color:#ffd23f">merma %</b> es el desperdicio del ingrediente (cáscara, recorte, derrame): encarece el costo real. Típico: bebidas embotelladas 0% · destilados servidos 2-5% · cítricos y verdura 15-40% · cortes de carne 10-25%. El costo por unidad ya la incluye.</div>
  <div style="overflow-x:auto"><table class="itable"><thead><tr><th>Ingrediente</th><th>Área</th><th>Un.</th><th class="r">Precio compra</th><th class="r">Tamaño</th><th class="r">Merma %</th><th class="r">$/u real</th><th></th></tr></thead><tbody>
  ${items.map(i=>{const uc=unitCost(i); const prep=i.kind==='prep';
    return `<tr><td>${i.name}${prep?' <span class="badge" style="background:rgba(255,210,63,.16);color:#ffd23f">⚗ elaborado</span>':''}</td>
    <td><span class="badge b-${i.area}">${i.area}</span></td>
    <td>${prep?`<span class="ucell">${i.unit}</span>`:`<select onchange="setIng('${i.id}','unit',this.value)">${['ml','g','u','cc'].map(u=>`<option ${i.unit===u?'selected':''}>${u}</option>`).join('')}</select>`}</td>
    ${prep
      ? `<td class="r ucell" colspan="2" style="text-align:center"><span onclick="go('elab')" style="color:#ffd23f;cursor:pointer">receta en Elaborados →</span></td>`
      : `<td class="r"><input class="num" type="number" inputmode="decimal" value="${i.buyPrice??''}" placeholder="0" onchange="setIng('${i.id}','buyPrice',this.value)"></td>
         <td class="r"><input class="num" type="number" inputmode="decimal" value="${i.buySize??''}" placeholder="0" onchange="setIng('${i.id}','buySize',this.value)"></td>`}
    <td class="r"><input class="num" type="number" inputmode="decimal" value="${i.merma??''}" placeholder="0" onchange="setIng('${i.id}','merma',this.value)" style="width:58px"></td>
    <td class="r num" style="color:${uc>0?'var(--text)':'var(--muted)'}">${uc>0?fmt2.format(uc):'—'}</td>
    <td><button class="del" onclick="delIngredient('${i.id}')">✕</button></td></tr>`;}).join('')}
  </tbody></table></div>`;
}

/* elaborados (sub-recetas) */
function renderElab(m){
  m.innerHTML = searchBar('Buscar elaborado…','Nuevo elaborado','addElab()');
  fillElab(document.getElementById('list'));
}
function fillElab(list){
  const q=ui.search.toLowerCase();
  const items=state.ingredients.filter(i=>i.kind==='prep'&&i.name.toLowerCase().includes(q)).sort((a,b)=>a.name.localeCompare(b.name));
  list.innerHTML = `<div class="hint">Preparaciones caseras (masa de pizza, panes, tortillas, salsas). Cada una tiene su mini-receta y un <b style="color:#ffd23f">rinde</b>; el costo por unidad se calcula solo y alimenta a los productos que la usan.</div>`+
    (items.length? items.map(elabCard).join('') : '<div class="empty">Todavía no hay elaborados. Tocá «＋ Nuevo elaborado» y convertí, por ejemplo, «Masa de pizza».</div>');
}
function elabCard(ing){
  const cost=unitCost(ing), open=ui.open[ing.id];
  const lines=state.recipes.filter(r=>r.productId===ing.id);
  const y=ing.yield, yTxt=y?(''+y).replace('.',','):'—';
  const batch=lines.reduce((a,r)=>a+(+r.qty||0)*unitCost(ingById(r.ingredientId)),0);
  return `<div class="card ${open?'open':''}" style="border-left-color:#ffd23f">
    <div class="chead" onclick="toggle('${ing.id}')">
      <span class="caret">▶</span>
      <div class="cname">${ing.name}<small>${lines.length} sub-ingrediente${lines.length!==1?'s':''} · rinde ${yTxt} ${ing.unit}</small></div>
      <div class="metric"><div class="v num">${cost>0?fmt.format(cost):'—'}</div><div class="l">por ${ing.unit}</div></div>
    </div>
    <div class="cbody">
      <div class="priceline">Rinde (cuánto produce la receta) <input class="num" type="number" inputmode="decimal" value="${ing.yield??''}" placeholder="0" onchange="setIng('${ing.id}','yield',this.value)"> <span class="ucell">${ing.unit}</span>
        <span style="margin-left:auto"><button class="del" style="font-size:12px" onclick="removeElab('${ing.id}')">Volver a comprado</button></span></div>
      <table class="lines"><thead><tr><th>Sub-ingrediente</th><th>Cant.</th><th>Un.</th><th class="r">$/u</th><th class="r">Costo</th><th></th></tr></thead><tbody>
      ${lines.map(r=>{const si=ingById(r.ingredientId);const uc=unitCost(si);const lc=(+r.qty||0)*uc;
        return `<tr><td>${si?si.name:'<i>?</i>'}${si&&si.kind==='prep'?' ⚗':''}</td>
        <td><input class="qty num" type="number" inputmode="decimal" value="${r.qty??''}" placeholder="0" onchange="setQty('${r.id}',this.value)"></td>
        <td class="ucell">${r.unit||(si?si.unit:'')}</td>
        <td class="r ucell num">${uc>0?fmt2.format(uc):'—'}</td>
        <td class="r num">${lc>0?fmt.format(lc):'—'}</td>
        <td><button class="del" onclick="delLine('${r.id}')">✕</button></td></tr>`;}).join('')}
      </tbody></table>
      <div class="addline">
        ${ingredientSelect(ing.id, null, ing.id)}
        <input class="qty num" type="number" inputmode="decimal" placeholder="cant." id="nq_${ing.id}">
        <button class="miniadd" onclick="addLine('${ing.id}')">＋ Agregar</button>
      </div>
      <div class="summaryrow"><span>Costo del lote: <b class="num">${fmt.format(batch)}</b></span><span>÷ ${yTxt} ${ing.unit} = <b class="num" style="color:#ffd23f">${cost>0?fmt.format(cost):'—'}</b> por ${ing.unit}</span></div>
    </div></div>`;
}
function addElab(){
  const buys=state.ingredients.filter(i=>i.kind!=='prep').sort((a,b)=>a.name.localeCompare(b.name));
  showModal(`<h3>Nuevo elaborado</h3>
    <div class="hint" style="margin-top:-6px">Algo que hacés en la casa (masa, pan, salsa) a partir de otros ingredientes. Su costo se calcula solo.</div>
    <div class="field"><label>Ingrediente</label><select id="e_pick" onchange="elabPickChange()">
      <option value="__new__">➕ Crear nuevo</option>
      <optgroup label="Convertir uno existente">${buys.map(i=>`<option value="${i.id}">${i.name}</option>`).join('')}</optgroup>
    </select></div>
    <div id="e_newfields">
      <div class="field"><label>Nombre</label><input id="e_name" placeholder="Ej: Masa de pizza"></div>
      <div class="field"><label>Área</label><select id="e_area"><option value="cocina">Cocina</option><option value="barra">Barra</option><option value="ambos">Ambos</option></select></div>
      <div class="field"><label>Unidad en que se usa</label><select id="e_unit"><option>u</option><option>g</option><option>ml</option><option>cc</option></select></div>
    </div>
    <div class="field"><label>Rinde — cuánto produce la receta (en esa unidad)</label><input id="e_yield" type="number" inputmode="decimal" placeholder="Ej: 10"></div>
    <div class="sheet-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="btn-save" onclick="saveElab()">Crear</button></div>`);
  setTimeout(()=>document.getElementById('e_name').focus(),50);
}
function elabPickChange(){ document.getElementById('e_newfields').style.display = (document.getElementById('e_pick').value==='__new__')?'block':'none'; }
function saveElab(){
  const pick=document.getElementById('e_pick').value;
  const yv=document.getElementById('e_yield').value; const yield_=yv===''?null:+yv;
  let ing;
  if(pick==='__new__'){
    const name=document.getElementById('e_name').value.trim(); if(!name){ toast('Poné un nombre'); return; }
    ing={id:newId('i'),name,area:document.getElementById('e_area').value,unit:document.getElementById('e_unit').value,buyPrice:null,buySize:null,merma:null,kind:'prep',yield:yield_};
    state.ingredients.push(ing);
  } else { ing=ingById(pick); if(!ing) return; ing.kind='prep'; ing.yield=yield_; ing.buyPrice=null; ing.buySize=null; }
  ui.open[ing.id]=true; ui.tab='elab'; renderTabs(); save(); closeModal(); render(); toast('Elaborado creado — cargá sus sub-ingredientes');
}
function removeElab(id){ if(!confirm('¿Volver este elaborado a ingrediente comprado? Se borran sus sub-ingredientes.')) return; const ing=ingById(id); if(!ing) return; ing.kind='buy'; ing.yield=null; state.recipes=state.recipes.filter(r=>r.productId!==id); save(); render(); }

/* resumen */
function renderResumen(m){
  let rows=state.products.map(p=>{const c=productCost(p.id),pr=+p.price||0;return{p,c,pr,marg:pr-c,fc:pr>0&&c>0?c/pr*100:null};});
  rows.sort((a,b)=>(b.fc??-1)-(a.fc??-1));
  m.innerHTML = `<div class="target-bar">🎯 Food cost objetivo <input class="num" type="number" value="${ui.target}" onchange="ui.target=+this.value||30;refreshStats();render()"> %
    <span class="hint" style="margin:0 0 0 auto">Verde ≤ objetivo · amarillo hasta +12 · rojo por encima</span></div>
  <div class="hint">Ordenado por food cost (de peor a mejor). Los que aún no tienen costo cargado aparecen al final.</div>
  <table class="itable"><thead><tr><th>Producto</th><th>Área</th><th class="r">Costo</th><th class="r">Precio</th><th class="r">Margen</th><th class="r">Food cost</th></tr></thead><tbody>
  ${rows.map(({p,c,pr,marg,fc})=>`<tr>
    <td>${p.name}</td><td><span class="badge b-${p.area}">${p.area}</span></td>
    <td class="r num">${c>0?fmt.format(c):'—'}</td>
    <td class="r num">${pr>0?fmt.format(pr):'—'}</td>
    <td class="r num" style="color:${marg>=0?'var(--green)':'var(--red)'}">${pr>0?fmt.format(marg):'—'}</td>
    <td class="r num ${fcClass(fc)}" style="font-weight:500">${fc!=null?Math.round(fc)+'%':'—'}</td></tr>`).join('')}
  </tbody></table>`;
}

/* ---------- mutations ---------- */
function toggle(id){ ui.open[id]=!ui.open[id]; render(); }
function setPrice(id,v){ prodById(id).price = v===''?null:+v; save(); render(); }
function setManual(id,v){ prodById(id).manualCost = v===''?null:+v; save(); render(); }
function setQty(rid,v){ const r=state.recipes.find(x=>x.id===rid); r.qty = v===''?null:+v; save(); render(); }
function setIng(id,f,v){ const i=ingById(id); i[f] = (f==='unit')? v : (v===''?null:+v); save(); render(); }
function delLine(rid){ state.recipes=state.recipes.filter(x=>x.id!==rid); save(); render(); }
function delProduct(id){ if(!confirm('¿Eliminar este producto?'))return; state.products=state.products.filter(p=>p.id!==id); state.recipes=state.recipes.filter(r=>r.productId!==id); save(); render(); }
function delIngredient(id){ const used=state.recipes.some(r=>r.ingredientId===id); if(used&&!confirm('Este ingrediente se usa en recetas. ¿Eliminar igual? Quedarán sin ese ítem.'))return; state.ingredients=state.ingredients.filter(i=>i.id!==id); state.recipes=state.recipes.filter(r=>r.ingredientId!==id); save(); render(); }

function addLine(pid){
  const sel=document.getElementById('ni_'+pid), qty=document.getElementById('nq_'+pid).value;
  let iid=sel.value;
  const owner=prodById(pid)||ingById(pid); const area=(owner&&owner.area)||'cocina';
  if(iid==='__new__'){ openIngredientModal(area, newIid=>{ state.recipes.push({id:newId('r'),productId:pid,ingredientId:newIid,qty:qty===''?null:+qty,unit:ingById(newIid).unit}); save(); render(); }); return; }
  if(!iid){ toast('Elegí un ingrediente'); return; }
  state.recipes.push({id:newId('r'),productId:pid,ingredientId:iid,qty:qty===''?null:+qty,unit:ingById(iid).unit});
  save(); render();
}

/* ---------- modals ---------- */
function showModal(html){ document.getElementById('sheet').innerHTML=html; document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal(); });

function addProduct(area){
  const cats=[...new Set(state.products.filter(p=>p.area===area).map(p=>p.category))];
  showModal(`<h3>Nuevo producto · ${area}</h3>
    <div class="field"><label>Nombre</label><input id="f_name" placeholder="Ej: Negroni de la casa"></div>
    <div class="field"><label>Categoría</label><input id="f_cat" list="catlist" placeholder="Ej: ${area==='barra'?'🍹 Los de Siempre':'🍕 Pizzas que se Cantan'}">
      <datalist id="catlist">${cats.map(c=>`<option value="${c}">`).join('')}</datalist></div>
    <div class="field"><label>Precio de venta ($)</label><input id="f_price" type="number" inputmode="decimal" placeholder="0"></div>
    <div class="sheet-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="btn-save" onclick="saveProduct('${area}')">Guardar</button></div>`);
  setTimeout(()=>document.getElementById('f_name').focus(),50);
}
function saveProduct(area){
  const name=document.getElementById('f_name').value.trim();
  if(!name){ toast('Poné un nombre'); return; }
  const cat=document.getElementById('f_cat').value.trim()||(area==='barra'?'Barra':'Cocina');
  const price=document.getElementById('f_price').value;
  const p={id:newId('p'),name,area,category:cat,price:price===''?null:+price};
  state.products.push(p); ui.open[p.id]=true; save(); closeModal(); render();
  toast('Producto agregado');
}

function addPromo(){
  showModal(`<h3>Nueva promo</h3>
    <div class="field"><label>Nombre</label><input id="f_name" placeholder="Ej: 2x1 Gin Tonic"></div>
    <div class="field"><label>Composición</label><textarea id="f_comp" rows="2" placeholder="Ej: 2 × Gin Tonic Gordon's"></textarea></div>
    <div class="field"><label>Costo insumos ($)</label><input id="f_cost" type="number" placeholder="0"></div>
    <div class="field"><label>Precio de venta ($)</label><input id="f_price" type="number" placeholder="0"></div>
    <div class="sheet-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="btn-save" onclick="savePromo()">Guardar</button></div>`);
  setTimeout(()=>document.getElementById('f_name').focus(),50);
}
function savePromo(){
  const name=document.getElementById('f_name').value.trim(); if(!name){toast('Poné un nombre');return;}
  state.products.push({id:newId('p'),name,area:'promo',category:'🔥 Promos',
    composition:document.getElementById('f_comp').value.trim(),
    manualCost:document.getElementById('f_cost').value===''?null:+document.getElementById('f_cost').value,
    price:document.getElementById('f_price').value===''?null:+document.getElementById('f_price').value});
  save(); closeModal(); render(); toast('Promo agregada');
}

function addIngredient(){ openIngredientModal('barra'); }
function openIngredientModal(defaultArea, cb){
  showModal(`<h3>Nuevo ingrediente</h3>
    <div class="field"><label>Nombre</label><input id="f_name" placeholder="Ej: Gin Beefeater"></div>
    <div class="field"><label>Área</label><select id="f_area">
      <option value="barra" ${defaultArea==='barra'?'selected':''}>Barra</option>
      <option value="cocina" ${defaultArea==='cocina'?'selected':''}>Cocina</option>
      <option value="ambos">Ambos</option></select></div>
    <div class="field"><label>Unidad base</label><select id="f_unit"><option>ml</option><option>g</option><option>u</option><option>cc</option></select></div>
    <div class="field"><label>Precio de compra ($) <span style="color:var(--muted)">(opcional ahora)</span></label><input id="f_price" type="number" placeholder="0"></div>
    <div class="field"><label>Tamaño de compra (en la unidad base)</label><input id="f_size" type="number" placeholder="Ej: 700"></div>
    <div class="field"><label>Merma % <span style="color:var(--muted)">(desperdicio; opcional)</span></label><input id="f_merma" type="number" placeholder="0"></div>
    <div class="sheet-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="btn-save" onclick='saveIngredient()'>Guardar</button></div>`);
  window._ingCb=cb||null;
  setTimeout(()=>document.getElementById('f_name').focus(),50);
}
function saveIngredient(){
  const name=document.getElementById('f_name').value.trim(); if(!name){toast('Poné un nombre');return;}
  const i={id:newId('i'),name,area:document.getElementById('f_area').value,unit:document.getElementById('f_unit').value,
    buyPrice:document.getElementById('f_price').value===''?null:+document.getElementById('f_price').value,
    buySize:document.getElementById('f_size').value===''?null:+document.getElementById('f_size').value,
    merma:document.getElementById('f_merma').value===''?null:+document.getElementById('f_merma').value};
  state.ingredients.push(i); save(); closeModal();
  if(window._ingCb){ const cb=window._ingCb; window._ingCb=null; cb(i.id); } else render();
  toast('Ingrediente agregado');
}

/* ---------- conexión nube ---------- */
function openConn(){
  const u=cfg?cfg.url:'', tk=cfg?cfg.token:'';
  showModal(`<h3>Conexión a la nube</h3>
    <div class="hint" style="margin-top:-6px">Pegá la URL del Web App de Apps Script y tu token. Los datos quedan en tu Google Sheet y se sincronizan en todos tus dispositivos.</div>
    <div class="field"><label>URL del Web App (termina en /exec)</label><input id="c_url" placeholder="https://script.google.com/macros/s/…/exec" value="${u}"></div>
    <div class="field"><label>Token</label><input id="c_tok" placeholder="tu clave secreta" value="${tk}"></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
      <button class="btn-save" onclick="connectNow()">Conectar</button>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn-cancel" style="flex:1;padding:11px;border-radius:8px" onclick="pushNow()">⬆ Subir mis datos</button>
      <button class="btn-cancel" style="flex:1;padding:11px;border-radius:8px" onclick="pullNow()">⬇ Bajar de la nube</button>
    </div>
    <button class="btn-cancel" style="width:100%;padding:11px;border-radius:8px;margin-top:10px" onclick="showHistory()">🕘 Historial de copias</button>
    <div id="c_status" class="hint" style="margin-top:12px;min-height:18px"></div>`);
}
function readConn(){ const url=(document.getElementById('c_url').value||'').trim(); const token=(document.getElementById('c_tok').value||'').trim(); return (url&&token)?{url,token}:null; }
function cstat(m){ const e=document.getElementById('c_status'); if(e) e.textContent=m; }
async function connectNow(){
  const c=readConn(); if(!c){ cstat('Completá URL y token.'); return; }
  saveCfg(c); cstat('Probando conexión…');
  try{ const d=await cloudGet(); const n=normalize(d);
    if(n && (n.ingredients.length||n.products.length)){
      if(confirm('Hay datos en la nube. ¿Bajarlos? Reemplaza lo que tenés en este dispositivo.')){ state=n; localStorage.setItem(KEY,JSON.stringify(state)); refreshStats(); render(); }
      cstat('Conectado ✓'); setSync('saved');
    } else { cstat('Conexión OK, pero la nube está vacía. Tocá «Subir mis datos» para cargarla.'); setSync('empty'); }
  }catch(e){ cstat('Error: revisá la URL y el token, y que la implementación tenga acceso «Cualquiera».'); setSync('error'); }
}
async function pushNow(){ const c=readConn(); if(c) saveCfg(c); if(!cfg){ cstat('Completá URL y token.'); return; } cstat('Subiendo…'); try{ await cloudPush(); dirty=false; cstat('Datos subidos a la nube ✓'); setSync('saved'); }catch(e){ cstat('Error al subir. Revisá la conexión.'); setSync('error'); } }
async function pullNow(){ const c=readConn(); if(c) saveCfg(c); if(!cfg){ cstat('Completá URL y token.'); return; } cstat('Bajando…'); try{ const d=await cloudGet(); const n=normalize(d); if(n){ state=n; localStorage.setItem(KEY,JSON.stringify(state)); refreshStats(); render(); cstat('Datos bajados ✓'); setSync('saved'); } }catch(e){ cstat('Error al bajar.'); setSync('error'); } }

async function showHistory(){
  const c=readConn(); if(c) saveCfg(c);
  if(!cfg){ cstat('Conectá primero (URL y token).'); return; }
  cstat('Cargando historial…');
  try{
    const r=await fetch(cfg.url+'?token='+encodeURIComponent(cfg.token)+'&action=list&t='+Date.now());
    const d=await r.json(); if(d.error) throw new Error(d.error);
    renderHistory(d.backups||[]);
  }catch(e){ cstat('No se pudo cargar el historial.'); }
}
function fmtFecha(s){ const dt=new Date(s); return isNaN(dt)? s : dt.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function renderHistory(list){
  showModal(`<h3>Historial de copias</h3>
    <div class="hint" style="margin-top:-6px">Copias automáticas con fecha (una por hora como máximo, se guardan las últimas 60). Al restaurar, se guarda primero una copia del estado actual, así nunca perdés nada.</div>
    <div style="max-height:48vh;overflow:auto;margin-top:4px">
    ${list.length? list.map(b=>`<div style="display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line)">
      <div style="flex:1;min-width:0"><div style="font-size:14px">${fmtFecha(b.when)}</div><div class="hint" style="margin:0">${b.summary||''}</div></div>
      <button class="miniadd" onclick="doRestore(${b.row})">Restaurar</button></div>`).join('') : '<div class="empty">Todavía no hay copias. Se crean a medida que vas guardando cambios.</div>'}
    </div>
    <div class="sheet-actions"><button class="btn-cancel" onclick="openConn()">← Volver</button></div>`);
}
async function doRestore(row){
  if(!confirm('¿Restaurar esta copia? Reemplaza los datos actuales en todos los dispositivos. (El estado actual queda guardado en el historial por las dudas.)')) return;
  try{
    const r=await fetch(cfg.url+'?token='+encodeURIComponent(cfg.token)+'&action=restore&row='+row+'&t='+Date.now());
    const d=await r.json(); const n=normalize(d); if(!n) throw new Error('bad');
    state=n; localStorage.setItem(KEY,JSON.stringify(state)); refreshStats(); render(); closeModal(); setSync('saved'); toast('Copia restaurada');
  }catch(e){ toast('Error al restaurar'); }
}

/* ---------- data io ---------- */
function exportXlsx(){
  const wb=XLSX.utils.book_new();
  const ing=state.ingredients.map(i=>({Ingrediente:i.name,Área:i.area,Tipo:(i.kind==='prep'?'elaborado':'comprado'),Unidad:i.unit,'Precio compra':i.buyPrice||'','Tamaño compra':i.buySize||'','Rinde':i.yield||'','Merma %':i.merma||'','Costo unit. (real)':unitCost(i)||''}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ing),'Ingredientes');
  ['barra','cocina'].forEach(area=>{
    const rec=[];
    state.products.filter(p=>p.area===area).forEach(p=>{
      recipesOf(p.id).forEach(r=>{const i=ingById(r.ingredientId);rec.push({Categoría:p.category,Producto:p.name,Ingrediente:i?i.name:'',Cantidad:r.qty||'',Unidad:r.unit,'Costo unit.':unitCost(i)||'',Costo:(+r.qty||0)*unitCost(i)||''});});
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rec.length?rec:[{}]),(area==='barra'?'Barra':'Cocina')+' Recetas');
  });
  const res=state.products.map(p=>{const c=productCost(p.id),pr=+p.price||0;return{Producto:p.name,Área:p.area,'Costo insumos':c||'','Precio venta':pr||'',Margen:pr-c,'Food cost %':pr>0&&c>0?Math.round(c/pr*100)+'%':''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(res),'Resumen');
  XLSX.writeFile(wb,'Zeppelin_Costos_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excel exportado');
}
function backup(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='zeppelin_costos_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('Backup descargado');
}
function restore(ev){
  const f=ev.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{const d=JSON.parse(rd.result); if(!d.ingredients||!d.products)throw 0; state=d; save(); render(); toast('Datos restaurados');}catch(e){toast('Archivo inválido');} ev.target.value=''; };
  rd.readAsText(f);
}
function resetAll(){ if(!confirm('Esto reemplaza todo por los datos base de la carta y borra tus cambios guardados. ¿Seguir?'))return; state=structuredClone(SEED); save(); render(); toast('Restaurado a datos base'); }

/* ---------- toast ---------- */
let _tt; function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),1800); }

/* ---------- init ---------- */
renderTabs(); refreshStats(); render();
if(cfg && cfg.token){ setSync('cargando'); initialPull(false); } else { setSync('local'); }
</script>
